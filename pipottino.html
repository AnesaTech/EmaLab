<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Procedural Automaton: Life & Chaos</title>
    <style>
        body, html { margin: 0; padding: 0; background: #0a0a0c; overflow: hidden; height: 100%; }
        canvas { display: block; filter: drop-shadow(0 0 10px rgba(0, 255, 200, 0.3)); }
        #hud {
            position: absolute; top: 20px; left: 20px;
            color: #00ffcc; font-family: 'Courier New', monospace; font-size: 11px;
            letter-spacing: 1px; border-left: 2px solid #00ffcc; padding-left: 10px;
            pointer-events: none; text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="hud">System: Procedural Animation<br>State: <span id="state-txt">Initializing</span></div>
    <canvas id="c"></canvas>

<script>
/**
 * PROCEDURAL CHARACTER ANIMATION ENGINE
 * States: CHAOS -> ASSEMBLY -> ACTION -> SHATTER
 */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const stateTxt = document.getElementById('state-txt');

let w, h, center;
let frame = 0;
let currentState = 'CHAOS';
let stateTimer = 0;

// Configurazione del personaggio (Coordinate locali relative al centro del corpo)
const bodyParts = [
    { name: 'torso',  lx: 0, ly: 0,  w: 40, h: 60, color: '#00ccff' },
    { name: 'head',   lx: 0, ly: -45, w: 25, h: 25, color: '#fff' },
    { name: 'l_arm',  lx: -30, ly: -15, w: 15, h: 45, color: '#00ccff' },
    { name: 'r_arm',  lx: 30, ly: -15, w: 15, h: 45, color: '#00ccff' },
    { name: 'l_leg',  lx: -15, ly: 50, w: 15, h: 50, color: '#0099ff' },
    { name: 'r_leg',  lx: 15, ly: 50, w: 15, h: 50, color: '#0099ff' }
];

// Inizializzazione particelle per ogni parte del corpo
const parts = bodyParts.map(p => ({
    ...p,
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    vx: (Math.random() - 0.5) * 10,
    vy: (Math.random() - 0.5) * 10,
    rot: Math.random() * Math.PI * 2,
    vRot: (Math.random() - 0.5) * 0.1
}));

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    center = { x: w / 2, y: h / 2 };
}

window.onresize = resize;
resize();

function lerp(a, b, t) { return a + (b - a) * t; }

function update() {
    stateTimer++;
    
    if (currentState === 'CHAOS') {
        stateTxt.innerText = "Entropia Casuale";
        parts.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.rot += p.vRot;
            // Bounce
            if (p.x < 0 || p.x > w) p.vx *= -1;
            if (p.y < 0 || p.y > h) p.vy *= -1;
        });
        if (stateTimer > 180) { currentState = 'ASSEMBLY'; stateTimer = 0; }
    } 
    
    else if (currentState === 'ASSEMBLY') {
        stateTxt.innerText = "Assemblaggio Struttura";
        let t = stateTimer / 120; // 2 secondi per assemblare
        parts.forEach(p => {
            let targetX = center.x + p.lx;
            let targetY = center.y + p.ly;
            p.x = lerp(p.x, targetX, 0.08);
            p.y = lerp(p.y, targetY, 0.08);
            p.rot = lerp(p.rot, 0, 0.1);
        });
        if (stateTimer > 150) { currentState = 'ACTION'; stateTimer = 0; }
    } 
    
    else if (currentState === 'ACTION') {
        stateTxt.innerText = "Esecuzione Routine (Walk & Wave)";
        let walkCycle = Math.sin(frame * 0.15);
        let waveCycle = Math.sin(frame * 0.2);
        
        // Offset orizzontale per i passi
        let walkOffset = Math.sin(frame * 0.05) * 100;

        parts.forEach(p => {
            let basePosX = center.x + p.lx + walkOffset;
            let basePosY = center.y + p.ly;
            
            if (p.name === 'l_leg') {
                p.y = basePosY + Math.max(0, -walkCycle * 15);
                p.x = basePosX + walkCycle * 10;
            } else if (p.name === 'r_leg') {
                p.y = basePosY + Math.max(0, walkCycle * 15);
                p.x = basePosX - walkCycle * 10;
            } else if (p.name === 'r_arm') {
                // Wave animation
                p.rot = -2 + Math.sin(frame * 0.3) * 0.5;
                p.x = basePosX; p.y = basePosY;
            } else {
                p.x = basePosX; p.y = basePosY;
                p.rot = 0;
            }
        });
        
        if (stateTimer > 300) { currentState = 'SHATTER'; stateTimer = 0; }
    } 
    
    else if (currentState === 'SHATTER') {
        stateTxt.innerText = "Decadimento Strutturale";
        parts.forEach(p => {
            p.vx = (Math.random() - 0.5) * 20;
            p.vy = (Math.random() - 0.5) * 20;
            p.vRot = (Math.random() - 0.5) * 0.2;
        });
        currentState = 'CHAOS'; stateTimer = 0;
    }
}

function draw() {
    ctx.fillStyle = 'rgba(10, 10, 12, 0.2)'; // Trail effect
    ctx.fillRect(0, 0, w, h);

    parts.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        
        // Glow effect
        ctx.shadowBlur = 15;
        ctx.shadowColor = p.color;
        
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        
        // Dettaglio interno (occhio/core)
        if(p.name === 'head') {
            ctx.fillStyle = '#000';
            ctx.fillRect(2, -5, 5, 5);
        }
        
        ctx.restore();
    });
}

function loop() {
    update();
    draw();
    frame++;
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
