<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>THE COUPLED PENDULUMS: CHAOS EDITION</title>
    <style>
        body, html { margin: 0; padding: 0; background: #010103; overflow: hidden; height: 100%; }
        canvas { display: block; filter: contrast(1.1) brightness(1.2); }
        #log {
            position: absolute; top: 20px; left: 20px;
            color: #4af; font-family: 'Courier New', monospace; font-size: 11px;
            pointer-events: none; opacity: 0.8; line-height: 1.5; text-transform: uppercase;
        }
        /* Stile pulsante Cyberpunk/Neon */
        #resetBtn {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 20, 0, 0.5); border: 1px solid #0f0; color: #0f0;
            padding: 12px 24px; font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold;
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            transition: all 0.1s ease-in-out; box-shadow: 0 0 10px rgba(0,255,0,0.2);
            backdrop-filter: blur(5px); z-index: 10;
        }
        #resetBtn:hover { 
            background: #0f0; color: #000; 
            box-shadow: 0 0 25px rgba(0,255,0,0.8); transform: translateX(-50%) scale(1.05);
        }
        #resetBtn:active { transform: translateX(-50%) scale(0.95); }
    </style>
</head>
<body>
    <div id="log">
        ENGINE: RK4 DIFFERENTIAL SOLVER<br>
        STATE: <span id="status" style="color:#0f0;">ACTIVE DYNAMICS</span><br>
        DAMPING: 0.9995 (REALITY SETTING)
    </div>
    
    <button id="resetBtn">INJECT CHAOS (RESTART)</button>
    <canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const statusTxt = document.getElementById('status');

let w, h, center, grid;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    grid = Math.min(w, h) * 0.1; 
    // Centratura dinamica perfetta (lascia spazio al grafico e al bottone in basso)
    center = { x: w / 2, y: h * 0.35 }; 
}
window.onresize = resize;
resize();

const config = { g: 9.81, l: grid * 3.5, m: 1.0, k: 0.1, damp: 0.9995 };
let state = [0, 0, 0, 0];
let history1 = []; let history2 = [];
const maxHistory = 400;

// Funzione di spawn casuale
function injectChaos() {
    // Genera angoli tra -90 e +90 gradi (-PI/2 e PI/2)
    const randomAngle = () => (Math.random() - 0.5) * Math.PI;
    
    state = [randomAngle(), 0, randomAngle(), 0];
    history1 = []; 
    history2 = [];
    
    statusTxt.innerText = "CHAOS INJECTED";
    statusTxt.style.color = "#ff00ff";
    setTimeout(() => { 
        statusTxt.innerText = "ACTIVE DYNAMICS"; 
        statusTxt.style.color = "#0f0";
    }, 500);
}

// Inizializza al primo avvio
injectChaos();

document.getElementById('resetBtn').addEventListener('click', injectChaos);

function derivatives(s) {
    const th1 = s[0], om1 = s[1], th2 = s[2], om2 = s[3];
    const acc1 = -(config.g / config.l) * Math.sin(th1) - (config.k / config.m) * (th1 - th2);
    const acc2 = -(config.g / config.l) * Math.sin(th2) + (config.k / config.m) * (th1 - th2);
    return [om1, acc1, om2, acc2];
}

function solveRK4(dt) {
    const k1 = derivatives(state);
    let nextS = state.map((s_i, i) => s_i + k1[i] * dt / 2);
    const k2 = derivatives(nextS);
    nextS = state.map((s_i, i) => s_i + k2[i] * dt / 2);
    const k3 = derivatives(nextS);
    nextS = state.map((s_i, i) => s_i + k3[i] * dt);
    const k4 = derivatives(nextS);
    
    state = state.map((s_i, i) => {
        let ns_i = s_i + (dt / 6) * (k1[i] + 2*k2[i] + 2*k3[i] + k4[i]);
        if (i === 1 || i === 3) ns_i *= config.damp;
        return ns_i;
    });
}

function drawSphere(x, y, color, speed) {
    const radius = 22;
    const glow = ctx.createRadialGradient(x, y, 0, x, y, radius * 3.5);
    glow.addColorStop(0, color + 'cc'); glow.addColorStop(0.2, color + '66'); glow.addColorStop(1, 'transparent');
    
    ctx.globalCompositeOperation = 'screen';
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(x, y, radius * 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';

    if (speed > 1.2) { 
        for(let i=0; i<12; i++) {
            const rx = x + (Math.random() - 0.5) * 45; const ry = y + (Math.random() - 0.5) * 45;
            ctx.fillStyle = `rgba(${parseInt(color.slice(1,3), 16)}, ${parseInt(color.slice(3,5), 16)}, ${parseInt(color.slice(5,7), 16)}, ${Math.random()*0.4})`;
            ctx.fillRect(rx, ry, 2, 2);
        }
    }

    const sGrd = ctx.createRadialGradient(x - 8, y - 8, 3, x, y, radius);
    sGrd.addColorStop(0, '#fff'); sGrd.addColorStop(0.4, color); sGrd.addColorStop(1, '#000');
    
    ctx.fillStyle = sGrd;
    ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.stroke();
}

function drawMolla(p1, p2) {
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)'; ctx.lineWidth = 2; ctx.beginPath();
    const points = 50;
    for(let i = 0; i <= points; i++) {
        const t = i / points;
        const ex = p1.x + (p2.x - p1.x) * t;
        const ey = p1.y + (p2.y - p1.y) * t + Math.sin(t * Math.PI * 25) * 12;
        if (i === 0) ctx.moveTo(ex, ey); else ctx.lineTo(ex, ey);
    }
    ctx.stroke();
}

function drawGraph() {
    const graphY = h - 140; 
    const graphH = 80;
    
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(center.x - maxHistory/2, graphY); ctx.lineTo(center.x + maxHistory/2, graphY); ctx.stroke();
    
    ctx.strokeStyle = '#0f0'; ctx.beginPath();
    history1.forEach((val, i) => { ctx.lineTo(center.x + (i - maxHistory/2), graphY + (val / Math.PI) * graphH); });
    ctx.stroke();
    
    ctx.strokeStyle = '#f0f'; ctx.beginPath();
    history2.forEach((val, i) => { ctx.lineTo(center.x + (i - maxHistory/2), graphY + (val / Math.PI) * graphH); });
    ctx.stroke();
}

function loop() {
    ctx.fillStyle = 'rgba(2, 2, 5, 0.2)'; 
    ctx.fillRect(0, 0, w, h);

    for(let s=0; s<4; s++) solveRK4(0.04); 

    const p1 = { x: center.x - grid * 1.5 - Math.sin(state[0]) * config.l, y: center.y + Math.cos(state[0]) * config.l };
    const p2 = { x: center.x + grid * 1.5 + Math.sin(state[2]) * config.l, y: center.y + Math.cos(state[2]) * config.l };

    ctx.strokeStyle = '#444'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(center.x - grid * 1.5, center.y); ctx.lineTo(p1.x, p1.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(center.x + grid * 1.5, center.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();

    drawMolla(p1, p2);
    drawSphere(p1.x, p1.y, '#00ff00', Math.abs(state[1] * config.l)); 
    drawSphere(p2.x, p2.y, '#ff00ff', Math.abs(state[3] * config.l)); 

    history1.push(state[0]); if (history1.length > maxHistory) history1.shift();
    history2.push(state[2]); if (history2.length > maxHistory) history2.shift();
    drawGraph();

    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
