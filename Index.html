<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmaLab - Game Hub</title>
    <style>
        :root {
            --primary-color: #00d4ff;
            --bg-color: #0f172a;
            --panel-color: #1e293b;
            --text-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Barra laterale (Lobby) */
        #sidebar {
            width: 280px;
            background-color: var(--panel-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            z-index: 10;
            overflow-y: auto;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .game-button {
            background: transparent;
            border: 1px solid #475569;
            color: var(--text-color);
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-align: left;
            font-weight: 600;
            width: 100%;
        }

        .game-button:hover {
            background-color: var(--primary-color);
            color: var(--bg-color);
            transform: translateX(5px);
        }

        .game-button.active {
            background-color: var(--primary-color);
            color: var(--bg-color);
            border-color: var(--primary-color);
        }

        /* Area di gioco principale */
        #game-container {
            flex-grow: 1;
            position: relative;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #fff;
        }

        #placeholder-text {
            text-align: center;
            color: #475569;
        }
    </style>
</head>
<body>

    <nav id="sidebar">
        <h1>EmaLab</h1>
        
        <button class="game-button" onclick="loadGame('Barra.html', this)">📊 Barra</button>
        <button class="game-button" onclick="loadGame('Cubodirubik.html', this)">🧊 Cubo di Rubik</button>
        <button class="game-button" onclick="loadGame('Esplosione.html', this)">💥 Esplosione</button>
        <button class="game-button" onclick="loadGame('molla.html', this)">➰ Molla</button>
        <button class="game-button" onclick="loadGame('Palla e molla.html', this)">🏀 Palla e Molla</button>
        <button class="game-button" onclick="loadGame('palline.html', this)">⚪ Palline</button>
        <button class="game-button" onclick="loadGame('Pipottino.html', this)">🧍 Pipottino</button>
        <button class="game-button" onclick="loadGame('Sistema solare.html', this)">🪐 Sistema Solare</button>
        <button class="game-button" onclick="loadGame('Traffico.html', this)">🚗 Traffico</button>
        
        <div style="margin-top: auto; padding-top: 20px; font-size: 0.8rem; opacity: 0.5; text-align: center;">
            &copy; 2026 EmaLab - Lab Edition
        </div>
    </nav>

    <main id="game-container">
        <div id="placeholder-text">
            <h2>Benvenuto in EmaLab</h2>
            <p>Seleziona un esperimento dalla lobby per iniziare</p>
        </div>
        <iframe id="game-frame" src="" style="display:none;"></iframe>
    </main>

    <script>
        function loadGame(url, button) {
            const iframe = document.getElementById('game-frame');
            const placeholder = document.getElementById('placeholder-text');
            
            placeholder.style.display = 'none';
            iframe.style.display = 'block';
            
            // Carica il file html selezionato
            iframe.src = url;

            // Gestione pulsante attivo per lo stile
            const buttons = document.querySelectorAll('.game-button');
            buttons.forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
        }
    </script>
</body>
</html>
